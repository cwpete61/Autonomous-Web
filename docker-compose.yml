services:
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-30000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep :3000 > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  marketing:
    build:
      context: .
      dockerfile: infra/docker/marketing.Dockerfile
    ports:
      - "${MARKETING_PORT:-20000}:3001"
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep :3001 > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-40000}:${API_PORT:-40000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agency:agency@postgres:5432/agency?schema=core
      REDIS_URL: redis://redis:6379
      API_PORT: ${API_PORT:-40000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-40000}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  workers:
    build:
      context: .
      dockerfile: infra/docker/workers.Dockerfile
    env_file: .env
    ports:
      - "${WORKERS_PORT:-44444}:${WORKERS_PORT:-44444}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agency:agency@postgres:5432/agency?schema=core
      REDIS_URL: redis://redis:6379
      WORKERS_PORT: ${WORKERS_PORT:-44444}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WORKERS_PORT:-44444}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agency}
      POSTGRES_USER: ${POSTGRES_USER:-agency}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agency}
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agency -d agency"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      dashboard:
        condition: service_healthy
      api:
        condition: service_healthy

  backup-runner:
    build:
      context: .
      dockerfile: infra/docker/backup-runner.Dockerfile
    env_file: .env
    volumes:
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
