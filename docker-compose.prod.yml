services:
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    env_file: .env.prod
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      api:
        condition: service_healthy

  marketing:
    build:
      context: .
      dockerfile: infra/docker/marketing.Dockerfile
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env.prod
    restart: always
    environment:
      REDIS_URL: redis://redis:6379
    deploy:
      resources:
        limits:
          memory: 1G
    secrets:
      - JWT_SECRET
      - ANTHROPIC_API_KEY
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET
      - DATABASE_URL
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  workers:
    build:
      context: .
      dockerfile: infra/docker/workers.Dockerfile
    env_file: .env.prod
    restart: always
    environment:
      REDIS_URL: redis://redis:6379
    deploy:
      resources:
        limits:
          memory: 1G
    secrets:
      - JWT_SECRET
      - ANTHROPIC_API_KEY
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET
      - DATABASE_URL
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 1G
    secrets:
      - POSTGRES_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_prod_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
      args:
        NGINX_CONF: infra/nginx/nginx.prod.conf
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on:
      dashboard:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./infra/nginx/certs:/etc/nginx/certs:ro

  backup-runner:
    build:
      context: .
      dockerfile: infra/docker/backup-runner.Dockerfile
    env_file: .env.prod
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL} # Note: This will be overridden by the secret if present in loader
    secrets:
      - DATABASE_URL
    volumes:
      - /var/backups/orbis:/app/backups
    depends_on:
      postgres:
        condition: service_healthy

secrets:
  JWT_SECRET:
    file: ./secrets/JWT_SECRET.txt
  ANTHROPIC_API_KEY:
    file: ./secrets/ANTHROPIC_API_KEY.txt
  STRIPE_SECRET_KEY:
    file: ./secrets/STRIPE_SECRET_KEY.txt
  STRIPE_WEBHOOK_SECRET:
    file: ./secrets/STRIPE_WEBHOOK_SECRET.txt
  POSTGRES_PASSWORD:
    file: ./secrets/POSTGRES_PASSWORD.txt
  DATABASE_URL:
    file: ./secrets/DATABASE_URL.txt

volumes:
  postgres_prod_data:
  redis_prod_data:
